<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whale Hunter</title>

<style>
body{
    margin:0;
    background:#0d1117;
    color:white;
    font-family:Arial,sans-serif;
}
header{
    background:#161b22;
    padding:20px;
    text-align:center;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:16px;
    padding:16px;
}
.card{
    background:#161b22;
    border-radius:12px;
    padding:16px;
}
.value{
    font-size:28px;
    color:#36d399;
    font-weight:bold;
}
small{
    color:#9ca3af;
}
button{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>🐋 Whale Hunter</h1>
<p>Prototype Dashboard</p>

<button onclick="refreshData()">
Refresh
</button>

</header>

<div class="grid">

<div class="card">
<h3>AI Score</h3>
<div class="value" id="score">
--
</div>
</div>

<div class="card">
<h3>Dormant Wallets</h3>
<div class="value" id="dormant">
--
</div>
</div>

<div class="card">
<h3>Rich List</h3>
<div class="value" id="rich">
--
</div>
</div>

<div class="card">
<h3>Status</h3>
<div class="value" id="status">
Ready
</div>
<small>
Prototype - connect APIs later
</small>
</div>

</div>

<script>

function refreshData(){

document.getElementById("score").innerHTML="87/100";

document.getElementById("dormant").innerHTML="2";

document.getElementById("rich").innerHTML="Loading...";

document.getElementById("status").innerHTML="Updated";

}

refreshData();

</script>

</body>
</html>
