<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whale Hunter</title>
<style>
body{
    background:#0d1117;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
}
.card{
    background:#161b22;
    margin:15px auto;
    padding:20px;
    border-radius:15px;
    max-width:350px;
    box-shadow:0 0 10px rgba(0,255,255,.2);
}
.value{
    font-size:28px;
    color:#00ff88;
    margin-top:10px;
}
</style>
</head>
<body>

<h1>🐋 Whale Hunter</h1>

<div class="card">
<h2>AI Score</h2>
<div class="value">0/100</div>
</div>

<div class="card">
<h2>Dormant Wallets</h2>
<div class="value">0</div>
</div>

<div class="card">
<h2>Rich List</h2>
<div class="value">Loading...</div>
</div>

<div class="card">
<h2>Status</h2>
<div class="value">Ready</div>
</div>

</body>
</html>
